 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة توحيد 1447</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
}

section{
padding:20px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#162d63;
}
</style>
</head>

<body>

<header>
<h1>منصة توحيد 1447</h1>
<p>منصة تعليمية شاملة للمهارات والتطوير</p>
</header>

<section>
<div class="card">
<h3>📘 المهارات التعليمية</h3>
<p>عرض المهارات الأساسية والمستهدفة للطلاب.</p>
<button>عرض التفاصيل</button>
</div>

<div class="card">
<h3>📝 الخطط الدراسية</h3>
<p>خطط دراسية منظمة حسب الأسابيع.</p>
<button>عرض الخطة</button>
</div>

<div class="card">
<h3>📊 التقييم والمتابعة</h3>
<p>متابعة أداء الطلاب وتقارير التقدم.</p>
<button>عرض التقارير</button>
</div>

<div class="card">
<h3>📂 المواد المساندة</h3>
<p>ملفات وأنشطة داعمة للتعليم.</p>
<button>عرض الملفات</button>
</div>
</section>

</body>
</html>
